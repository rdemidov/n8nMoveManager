<section class="panel" style="max-width: 28rem; margin: 4rem auto;">
  <header><h1>Sign in</h1><p>Use your local n8n Move Manager account.</p></header>
  @if (error()) { <div class="alert danger">{{ error() }}</div> }
  <form class="form-grid" (ngSubmit)="submit()">
    <label><span>User name</span><input name="userName" [(ngModel)]="userName" autocomplete="username" required></label>
    <label><span>Password</span><input type="password" name="password" [(ngModel)]="password" autocomplete="current-password" required></label>
    <button class="button primary" [disabled]="busy()">{{ busy() ? 'Signing in…' : 'Sign in' }}</button>
  </form>
</section>
